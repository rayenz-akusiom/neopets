<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Rayenz Hub</title>
   <link rel="shortcut icon" href="https://www.google.com/s2/favicons?sz=64&amp;domain=neopets.com">
   <link rel="stylesheet" href="shared/shell.css">
</head>
<body>
   <button type="button" id="hub-nav-toggle" class="hub-nav-toggle" aria-label="Open menu">&#9776;</button>
   <div id="hub-nav-backdrop" class="hub-nav-backdrop"></div>
   <div class="hub-layout">
      <nav id="hub-nav" class="hub-nav" aria-label="Apps">
         <div class="hub-nav-header">
            <h1>Rayenz Hub</h1>
            <p>Personal apps</p>
         </div>
         <ul class="hub-nav-list">
            <li><a class="hub-nav-link" href="#/dailies">Dailies</a></li>
            <li><a class="hub-nav-link" href="#/deck-review">Deck Review</a></li>
            <li><a class="hub-nav-link" href="#/order-reconcile">Order Reconcile</a></li>
         </ul>
      </nav>
      <main class="hub-main">
         <div id="app-root"></div>
      </main>
   </div>

   <script src="shared/storage.js"></script>
   <script src="shared/router.js"></script>
   <script src="apps/dailies/load.js"></script>
   <script src="apps/deck-review/archidekt-export.js"></script>
   <script src="apps/deck-review/profile-sync.js"></script>
   <script src="apps/deck-review/deck-review.js"></script>
   <script src="apps/order-reconcile/email-parse.js"></script>
   <script src="apps/order-reconcile/order-reconcile-export.js"></script>
   <script src="apps/order-reconcile/order-reconcile.js"></script>
   <script>
      HubRouter.registerRoute('/dailies', loadDailiesApp);
      HubRouter.registerRoute('/deck-review', loadDeckReviewApp);
      HubRouter.registerRoute('/order-reconcile', loadOrderReconcileApp);
      HubRouter.init();
   </script>
</body>
</html>
